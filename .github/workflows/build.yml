name: Build

on:
  pull_request:
  workflow_call:
    inputs:
      configuration:
        description: The Xcode build configuration to build.
        type: string
        default: Debug
      version:
        description: The marketing version to stamp into the build.
        type: string
        default: ''

permissions:
  contents: read

# Validate only the latest commit on a PR; never cancel a release build.
concurrency:
  group: build-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Harden and speed up Homebrew: trusted taps only, and skip the slow pre-install auto-update.
env:
  HOMEBREW_REQUIRE_TAP_TRUST: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install XcodeGen
        shell: sh
        run: brew install xcodegen
      - name: Build And Test
        shell: sh
        env:
          CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
          VERSION: ${{ inputs.version }}
        # PRs validate with tests (Debug); releases build the shippable app (Release).
        run: if [ "${CONFIGURATION}" = "Release" ]; then make build; else make test; fi
      # Only the release path consumes the artifact; PRs just build and test.
      - name: Package App
        if: ${{ inputs.configuration == 'Release' }}
        shell: sh
        env:
          CONFIGURATION: ${{ inputs.configuration }}
        run: ditto -c -k --keepParent "build/Build/Products/${CONFIGURATION}/hark.app" hark.zip
      - name: Upload Artifact
        if: ${{ inputs.configuration == 'Release' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hark-app
          path: hark.zip
