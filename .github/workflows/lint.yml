name: Lint

on: pull_request

permissions:
  contents: read

# Lint only the latest commit on a PR; cancel superseded runs.
concurrency:
  group: lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Harden and speed up Homebrew: trusted taps only, and skip the slow pre-install auto-update.
env:
  HOMEBREW_REQUIRE_TAP_TRUST: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  swift:
    name: Swift
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Tools
        shell: sh
        run: brew install swiftformat swiftlint
      - name: Check Formatting
        shell: sh
        run: swiftformat --lint .
      - name: Lint
        shell: sh
        run: swiftlint lint --strict
