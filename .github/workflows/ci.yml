name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Supply-chain hardening: install only from trusted Homebrew taps.
env:
  HOMEBREW_REQUIRE_TAP_TRUST: 1

jobs:
  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Tools
        shell: sh
        run: brew install swiftformat swiftlint
      - name: Check Formatting
        shell: sh
        run: swiftformat --lint .
      - name: Lint
        shell: sh
        run: swiftlint lint --strict
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install XcodeGen
        shell: sh
        run: brew install xcodegen
      - name: Build And Test
        shell: sh
        run: make test
