name: hark
options:
  bundleIdPrefix: com.craigsloggett
  deploymentTarget:
    macOS: '26.0'
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true
settings:
  base:
    SWIFT_VERSION: '6.0'
    MARKETING_VERSION: 0.0.1
    CURRENT_PROJECT_VERSION: '1'
    GENERATE_INFOPLIST_FILE: false
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    STRING_CATALOG_GENERATE_SYMBOLS: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.15.0
targets:
  hark:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/AppIcon.icon
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: FluidAudio
    scheme:
      testTargets:
        - harkTests
      environmentVariables:
        - variable: HARK_DIARIZATION_DEBUG
          value: '1'
          isEnabled: false
        - variable: HARK_ASR_DEBUG
          value: '1'
          isEnabled: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.craigsloggett.hark
        PRODUCT_NAME: hark
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: hark.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS:
          - '@executable_path/../Frameworks'
  harkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: hark
      - package: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.craigsloggett.harkTests
        GENERATE_INFOPLIST_FILE: true
